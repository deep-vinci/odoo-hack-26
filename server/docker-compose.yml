services:
  db:
    image: postgres:16-alpine
    container_name: odoo_hack_pg
    restart: unless-stopped
    ports:
      - "5533:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: odoo_hack
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
